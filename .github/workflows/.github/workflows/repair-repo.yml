name: Repair repository layout

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/repair-repo.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repair duplicated web-upload paths
        shell: bash
        run: |
          set -euo pipefail
          rm -rf src/src tests/tests
          mkdir -p src/agents src/config src/discord src/domain tests
          base64 -d > 'src/agents/characters.ts' <<'B64_src/agents/characters.ts'

B64_src/agents/characters.ts
          base64 -d > 'src/config/env.ts' <<'B64_src/config/env.ts'

B64_src/config/env.ts
          base64 -d > 'src/discord/requestParser.ts' <<'B64_src/discord/requestParser.ts'

B64_src/discord/requestParser.ts
          base64 -d > 'src/discord/visualMessage.ts' <<'B64_src/discord/visualMessage.ts'

B64_src/discord/visualMessage.ts
          base64 -d > 'src/domain/assertNever.ts' <<'B64_src/domain/assertNever.ts'
ZXhwb3J0IGZ1bmN0aW9uIGFzc2VydE5ldmVyKHZhbHVlOiBuZXZlcik6IG5ldmVyIHsKICB0aHJvdyBuZXcgRXJyb3IoYFVuZXhwZWN0ZWQgdmFyaWFudDogJHtKU09OLnN0cmluZ2lmeSh2YWx1ZSl9YCk7Cn0K
B64_src/domain/assertNever.ts
          base64 -d > 'src/domain/brand.ts' <<'B64_src/domain/brand.ts'
ZXhwb3J0IHR5cGUgQnJhbmQ8VFZhbHVlLCBUQnJhbmQgZXh0ZW5kcyBzdHJpbmc+ID0gVFZhbHVlICYgeyByZWFkb25seSBfX2JyYW5kOiBUQnJhbmQgfTsK
B64_src/domain/brand.ts
          base64 -d > 'src/domain/task.ts' <<'B64_src/domain/task.ts'

B64_src/domain/task.ts
          base64 -d > 'src/domain/taskVisual.ts' <<'B64_src/domain/taskVisual.ts'

B64_src/domain/taskVisual.ts
          base64 -d > 'src/index.ts' <<'B64_src/index.ts'

B64_src/index.ts
          base64 -d > 'tests/requestParser.test.ts' <<'B64_tests/requestParser.test.ts'

B64_tests/requestParser.test.ts
          base64 -d > 'tests/taskVisual.test.ts' <<'B64_tests/taskVisual.test.ts'

B64_tests/taskVisual.test.ts
          base64 -d > 'README.md' <<'B64_README.md'

B64_README.md
          base64 -d > 'package.json' <<'B64_package.json'

B64_package.json
          base64 -d > 'tsconfig.json' <<'B64_tsconfig.json'

B64_tsconfig.json
          base64 -d > 'biome.json' <<'B64_biome.json'

B64_biome.json
          base64 -d > '.env.example' <<'B64_.env.example'
RElTQ09SRF9UT0tFTj0KRElTQ09SRF9DTElFTlRfSUQ9CkRJU0NPUkRfR1VJTERfSUQ9Cg==
B64_.env.example
          base64 -d > '.gitignore' <<'B64_.gitignore'
bm9kZV9tb2R1bGVzLwouZW52Ci5lbnYubG9jYWwKLkRTX1N0b3JlCmNvdmVyYWdlLwpkaXN0Lwo=
B64_.gitignore
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No layout changes needed."
          else
            git commit -m "Repair repository layout for Discord MVP"
            git push
          fi
